[toolchain]
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
private_dao = "6NvJiHpUPbmnbgrdHx6Pne5K1qzCWXfwkT5MmDxShkKe"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npm test"

[test]
startup_wait = 120000

[test.validator]
gossip_port = 19001
dynamic_port_range = "19002-19020"
